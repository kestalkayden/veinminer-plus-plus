# Reopen RenderPipelines.register (private) so the shape guide can register its custom
# depth-disabled lines pipeline. Sodium/Iris (Embeddium/Oculus) silently drop UNregistered
# custom pipelines, so the guide vanishes in-pack while rendering fine in vanilla.
public net.minecraft.client.renderer.RenderPipelines register(Lcom/mojang/blaze3d/pipeline/RenderPipeline;)Lcom/mojang/blaze3d/pipeline/RenderPipeline;
