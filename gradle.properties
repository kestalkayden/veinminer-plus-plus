# Gradle
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# Minecraft
minecraft_version=26.2

# Fabric
loader_version=0.18.4
loom_version=1.15-SNAPSHOT
fabric_version=0.152.1+26.2

# NeoForge
neoforge_version=26.2.0.0-beta
moddev_version=2.0.141
# CI reads this: set false to hold the NeoForge build/publish off (e.g. before NeoForged ships
# a build for the target MC version). true = NeoForge participates in builds and releases.
neoforge_enabled=true

# Config libs
modmenu_version=20.0.0-beta.2

# Mod
mod_version=0.2.0
maven_group=com.kestalkayden.veinminerplusplus
archives_base_name=veinminerplusplus

# Release
# CI gate for Modrinth publishing: true = a v* tag publishes Modrinth alongside CurseForge +
# the GitHub Release; set false to hold Modrinth back (e.g. a CurseForge-first release) until tested.
modrinth_enabled=true
